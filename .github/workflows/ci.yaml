name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bunx @biomejs/biome format --error-on-warnings .

      - name: Lint
        run: bunx @biomejs/biome lint --error-on-warnings .

      - name: Test
        run: bun test
        env:
          SLACK_SIGNING_SECRET: ci-test-secret
          SLACK_BOT_TOKEN: xoxb-ci-test-token

      - name: Build
        run: bun run build
